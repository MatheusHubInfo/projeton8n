name: Robot Framework Automated Test

on:
  workflow_dispatch: # Permite que o n8n dispare esse teste remotamente

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Node.js e Dependências do Browser
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Robot Framework e Bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-browser
          rfbrowser init

      - name: Executar os Testes em modo Headless
        run: |
          mkdir -p results
          robot -d ./results tests/login_check.robot

      - name: Upload dos Resultados do Robot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/
